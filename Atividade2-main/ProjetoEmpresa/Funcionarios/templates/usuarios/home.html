<h1>Bem-vindo!</h1>

{% if user.is_authenticated %}
    <p>Olá, {{ user.username }}</p>
    <a href="{% url 'painel' %}">Ir para painel</a>
    <form action="{% url 'logout' %}" method="post">
        {% csrf_token %}
        <button type="submit">Logout</button>
    </form>

{% else %}
    <a href="{% url 'login' %}">Login</a>
{% endif %}
